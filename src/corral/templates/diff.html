<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diff View — Corral</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --accent: #58a6ff;
            --success: #3fb950;
            --error: #f85149;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .diff-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .diff-header-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
        }

        .diff-filepath {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .diff-filepath .dir {
            color: var(--text-secondary);
            font-weight: 400;
        }

        .diff-toolbar {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .diff-toolbar button {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .diff-toolbar button:hover {
            color: var(--text-primary);
            background: var(--bg-hover, #30363d);
        }

        .diff-toolbar button.active {
            color: var(--accent);
            border-color: var(--accent);
        }

        .diff-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .diff-error {
            padding: 40px 20px;
            text-align: center;
            color: var(--error);
            font-size: 14px;
        }

        .diff-empty {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        #diff-container {
            padding: 0;
        }

        /* Dark theme overrides for diff2html */
        .d2h-wrapper {
            background: var(--bg-primary) !important;
        }

        .d2h-file-header {
            display: none !important;
        }

        .d2h-file-wrapper {
            border: none !important;
            margin: 0 !important;
        }

        .d2h-code-wrapper {
            background: var(--bg-primary) !important;
        }

        .d2h-code-line,
        .d2h-code-side-line {
            background: var(--bg-primary) !important;
            color: var(--text-primary) !important;
            font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace !important;
            font-size: 12px !important;
            padding: 0 10px !important;
        }

        .d2h-code-line-prefix {
            color: var(--text-muted) !important;
            user-select: none;
        }

        /* Addition lines */
        .d2h-ins, .d2h-ins .d2h-code-side-line, .d2h-ins .d2h-code-line {
            background: rgba(63, 185, 80, 0.1) !important;
        }

        .d2h-ins .d2h-code-line-prefix {
            color: var(--success) !important;
        }

        ins {
            background: rgba(63, 185, 80, 0.25) !important;
            text-decoration: none !important;
            color: var(--text-primary) !important;
        }

        /* Deletion lines */
        .d2h-del, .d2h-del .d2h-code-side-line, .d2h-del .d2h-code-line {
            background: rgba(248, 81, 73, 0.1) !important;
        }

        .d2h-del .d2h-code-line-prefix {
            color: var(--error) !important;
        }

        del {
            background: rgba(248, 81, 73, 0.25) !important;
            text-decoration: none !important;
            color: var(--text-primary) !important;
        }

        /* Line numbers */
        .d2h-code-linenumber, .d2h-code-side-linenumber {
            background: var(--bg-secondary) !important;
            color: var(--text-muted) !important;
            border-right: 1px solid var(--border) !important;
            font-size: 11px !important;
            user-select: none;
        }

        .d2h-ins .d2h-code-linenumber,
        .d2h-ins .d2h-code-side-linenumber {
            background: rgba(63, 185, 80, 0.12) !important;
            color: var(--success) !important;
        }

        .d2h-del .d2h-code-linenumber,
        .d2h-del .d2h-code-side-linenumber {
            background: rgba(248, 81, 73, 0.12) !important;
            color: var(--error) !important;
        }

        /* Hunk headers */
        .d2h-info {
            background: rgba(88, 166, 255, 0.08) !important;
            color: var(--accent) !important;
            border: none !important;
        }

        .d2h-code-line-ctn {
            color: var(--text-primary) !important;
        }

        /* Table layout */
        .d2h-diff-table {
            font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace !important;
            border-collapse: collapse !important;
        }

        .d2h-diff-tbody tr {
            border: none !important;
        }

        .d2h-file-diff {
            overflow-x: auto !important;
        }

        /* Side-by-side specific */
        .d2h-file-side-diff {
            width: 50% !important;
        }

        .d2h-files-diff {
            display: flex !important;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Refresh animation */
        @keyframes spin { to { transform: rotate(360deg); } }
        .refreshing { animation: spin 1s linear infinite; display: inline-block; }
    </style>
</head>
<body>
    <div class="diff-header">
        <img src="/static/corral.png" alt="Corral" class="diff-header-icon">
        <div class="diff-filepath" id="diff-filepath">Loading...</div>
        <div class="diff-toolbar">
            <button id="btn-unified" onclick="setViewMode('line-by-line')">Unified</button>
            <button id="btn-split" class="active" onclick="setViewMode('side-by-side')">Split</button>
            <button id="btn-refresh" onclick="refreshDiff()" title="Refresh diff">&#x21bb;</button>
        </div>
    </div>
    <div id="diff-container">
        <div class="diff-loading">Loading diff...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const agentName = params.get('agent');
        const filepath = params.get('file');
        const sessionId = params.get('session_id');
        let viewMode = 'side-by-side';
        let lastDiff = '';

        function splitPath(fp) {
            const i = fp.lastIndexOf('/');
            if (i === -1) return { dir: '', name: fp };
            return { dir: fp.substring(0, i + 1), name: fp.substring(i + 1) };
        }

        function updateTitle() {
            const el = document.getElementById('diff-filepath');
            if (!filepath) {
                el.textContent = 'No file specified';
                return;
            }
            const { dir, name } = splitPath(filepath);
            el.innerHTML = (dir ? '<span class="dir">' + escapeHtml(dir) + '</span>' : '') + escapeHtml(name);
            document.title = name + ' — Diff — Corral';
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function setViewMode(mode) {
            viewMode = mode;
            document.getElementById('btn-unified').classList.toggle('active', mode === 'line-by-line');
            document.getElementById('btn-split').classList.toggle('active', mode === 'side-by-side');
            renderDiff(lastDiff);
        }

        function renderDiff(diffText) {
            const container = document.getElementById('diff-container');
            if (!diffText) {
                container.innerHTML = '<div class="diff-empty">No changes in this file</div>';
                return;
            }
            lastDiff = diffText;
            const html = Diff2Html.html(diffText, {
                drawFileList: false,
                matching: 'lines',
                outputFormat: viewMode,
                colorScheme: 'dark',
            });
            container.innerHTML = html;
        }

        async function loadDiff() {
            if (!agentName || !filepath) {
                document.getElementById('diff-container').innerHTML =
                    '<div class="diff-error">Missing agent or file parameter</div>';
                return;
            }

            const qs = new URLSearchParams({ filepath });
            if (sessionId) qs.set('session_id', sessionId);

            try {
                const resp = await fetch(
                    '/api/sessions/live/' + encodeURIComponent(agentName) + '/diff?' + qs
                );
                const data = await resp.json();
                if (data.error) {
                    document.getElementById('diff-container').innerHTML =
                        '<div class="diff-error">' + escapeHtml(data.error) + '</div>';
                    return;
                }
                renderDiff(data.diff || '');
            } catch (e) {
                document.getElementById('diff-container').innerHTML =
                    '<div class="diff-error">Failed to load diff</div>';
            }
        }

        async function refreshDiff() {
            const btn = document.getElementById('btn-refresh');
            btn.classList.add('refreshing');

            // Also trigger backend file refresh so the main file list stays in sync
            try {
                const body = {};
                if (sessionId) body.session_id = sessionId;
                fetch(
                    '/api/sessions/live/' + encodeURIComponent(agentName) + '/files/refresh',
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body),
                    }
                );
            } catch (e) { /* best-effort */ }

            await loadDiff();
            setTimeout(() => btn.classList.remove('refreshing'), 300);
        }

        updateTitle();
        loadDiff();

        // Auto-refresh every 10 seconds
        setInterval(loadDiff, 10000);
    </script>
</body>
</html>
