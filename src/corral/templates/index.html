<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corral</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap">
    <!-- xterm.js terminal emulator -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10/lib/addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11/lib/addon-web-links.min.js"></script>
</head>

<body>
    <header class="top-bar">
        <div class="top-bar-brand">
            <img src="/static/corral.png" alt="Corral" class="top-bar-logo">
            <h1>Corral</h1>
        </div>
        <div class="top-bar-actions">
            <button class="top-bar-btn" onclick="showWebhookModal()"
                    title="Webhook notifications">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
                     stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                     stroke-linejoin="round">
                    <path d="M8 1a5 5 0 0 1 5 5v2.5l1.5 2H1.5L3 8.5V6A5 5 0 0 1 8 1z"/>
                    <path d="M6 13a2 2 0 0 0 4 0"/>
                </svg>
            </button>
            <button class="top-bar-btn" onclick="showSettingsModal()" title="Settings">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M6.7 1.4h2.6l.4 1.8.5.2 1.6-.9 1.8 1.8-.9 1.6.2.5 1.8.4v2.6l-1.8.4-.2.5.9 1.6-1.8 1.8-1.6-.9-.5.2-.4 1.8H6.7l-.4-1.8-.5-.2-1.6.9-1.8-1.8.9-1.6-.2-.5-1.8-.4V6.7l1.8-.4.2-.5-.9-1.6 1.8-1.8 1.6.9.5-.2z" />
                    <circle cx="8" cy="8" r="2.5" />
                </svg>
            </button>
        </div>
    </header>

    <div class="layout">
        {% include "includes/sidebar.html" %}
        <div class="sidebar-resize-handle" id="sidebar-resize-handle"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div id="welcome-screen" class="welcome">
                <img src="/static/corral.png" alt="Corral" class="welcome-logo">
                <h2>Welcome to Corral</h2>
                <p>Select a session from the sidebar, or get started:</p>
                <div class="welcome-actions">
                    <button class="welcome-action-card" onclick="showLaunchModal()" aria-label="Launch Agent">
                        <span class="material-icons">add_circle</span>
                        <span>Launch Agent</span>
                    </button>
                    <button class="welcome-action-card" onclick="showSettingsModal()" aria-label="Settings">
                        <span class="material-icons">settings</span>
                        <span>Settings</span>
                    </button>
                </div>
            </div>

            {% include "includes/views/live_session.html" %}

            {% include "includes/views/history_session.html" %}

            <!-- Scheduler Job Detail View -->
            <div id="scheduler-view" style="display:none" class="scheduler-view">
                <div id="scheduler-detail"></div>
            </div>
        </main>
    </div>

    {% include "includes/modals.html" %}

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="/static/app.js"></script>
</body>

</html>
