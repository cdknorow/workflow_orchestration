name: Build macOS App

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write  # Needed to upload release assets

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[tray]"
          pip install py2app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Generate .icns icon
        run: |
          ICON_PNG="src/coral/static/coral.png"
          ICONSET_DIR="Coral.iconset"
          mkdir -p "$ICONSET_DIR"
          for size in 16 32 64 128 256 512; do
            sips -z $size $size "$ICON_PNG" --out "${ICONSET_DIR}/icon_${size}x${size}.png" >/dev/null
          done
          for size in 32 64 128 256 512 1024; do
            half=$((size / 2))
            sips -z $size $size "$ICON_PNG" --out "${ICONSET_DIR}/icon_${half}x${half}@2x.png" >/dev/null
          done
          iconutil -c icns "$ICONSET_DIR" -o Coral.icns
          rm -rf "$ICONSET_DIR"

      - name: Build Coral.app with py2app
        run: python setup_app.py py2app

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Coral" \
            --volicon "Coral.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Coral.app" 175 190 \
            --app-drop-link 425 190 \
            --no-internet-enable \
            "dist/Coral.dmg" \
            "dist/Coral.app"

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Coral-macOS
          path: dist/Coral.dmg

      - name: Upload DMG to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/Coral.dmg
