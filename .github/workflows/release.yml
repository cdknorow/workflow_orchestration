name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Linux ──────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: coral-go/go.sum

      - name: Build Linux binaries (amd64)
        working-directory: coral-go
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p ../dist/linux
          for cmd in coral launch-coral coral-board coral-hook-agentic-state coral-hook-message-check coral-hook-task-sync; do
            [ -d "./cmd/$cmd" ] || continue
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
              -ldflags "-s -w" \
              -o "../dist/linux/$cmd" \
              "./cmd/$cmd/"
          done

      - name: Create tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd dist/linux
          tar czf "../coral-linux-amd64-${VERSION}.tar.gz" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: coral-linux-amd64
          path: dist/coral-linux-amd64-*.tar.gz

  # ── Windows ────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: coral-go/go.sum

      - name: Install MinGW (for CGO builds)
        run: choco install mingw -y

      - name: Build Windows binaries (amd64)
        working-directory: coral-go
        run: |
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          New-Item -ItemType Directory -Force -Path ..\dist\windows\bin | Out-Null

          # Pure Go binaries (no CGO)
          $env:CGO_ENABLED = "0"
          foreach ($cmd in @("coral", "launch-coral", "coral-board", "coral-hook-agentic-state", "coral-hook-message-check", "coral-hook-task-sync")) {
            if (Test-Path "./cmd/$cmd") {
              go build -ldflags "-s -w" -o "..\dist\windows\bin\$cmd.exe" "./cmd/$cmd/"
            }
          }

          # CGO binaries (systray, webview)
          $env:CGO_ENABLED = "1"
          $env:CC = "gcc"
          go build -ldflags "-s -w -H windowsgui" -o "..\dist\windows\bin\coral-tray.exe" "./cmd/coral-tray/"
          go build -tags webview -ldflags "-s -w -H windowsgui" -o "..\dist\windows\bin\coral-app.exe" "./cmd/coral-app/"

      - name: Import signing certificate
        if: env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath = Join-Path $env:RUNNER_TEMP "certificate.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          echo "CERT_PATH=$certPath" >> $env:GITHUB_ENV

      - name: Sign executables
        if: env.CERT_PATH != ''
        env:
          WINDOWS_CERTIFICATE_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
        run: |
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe"
          foreach ($exe in @("coral.exe", "launch-coral.exe", "coral-board.exe", "coral-tray.exe", "coral-app.exe")) {
            $exePath = "dist\windows\bin\$exe"
            if (Test-Path $exePath) {
              & $signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
                /f $env:CERT_PATH /p $env:WINDOWS_CERTIFICATE_PWD $exePath
            }
          }

      - name: Install WiX and build MSI
        run: |
          dotnet tool install --global wix
          $version = "${{ github.ref_name }}" -replace "^v", ""
          if (-not ($version -match "^\d+\.\d+\.\d+")) { $version = "0.0.0" }
          $binDir = (Resolve-Path "dist\windows\bin").Path
          $buildDir = (Resolve-Path "dist\windows").Path
          $msiPath = Join-Path $buildDir "Coral-$version-x64.msi"
          wix build scripts\coral.wxs -d "Version=$version" -d "BinDir=$binDir" -d "BuildDir=$buildDir" -o $msiPath
          echo "MSI_PATH=$msiPath" >> $env:GITHUB_ENV
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Sign MSI
        if: env.CERT_PATH != ''
        env:
          WINDOWS_CERTIFICATE_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
        run: |
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe"
          & $signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            /f $env:CERT_PATH /p $env:WINDOWS_CERTIFICATE_PWD $env:MSI_PATH

      - name: Create portable ZIP
        run: |
          $zipPath = "dist\windows\Coral-$env:VERSION-x64-portable.zip"
          Compress-Archive -Path "dist\windows\bin\*" -DestinationPath $zipPath
          echo "ZIP_PATH=$zipPath" >> $env:GITHUB_ENV

      - name: Cleanup certificate
        if: always() && env.CERT_PATH != ''
        run: Remove-Item $env:CERT_PATH -ErrorAction SilentlyContinue

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: coral-windows-msi
          path: ${{ env.MSI_PATH }}

      - name: Upload portable ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: coral-windows-portable
          path: ${{ env.ZIP_PATH }}

  # ── macOS ──────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: coral-go/go.sum

      - name: Build universal binaries
        working-directory: coral-go
        run: |
          mkdir -p ../dist/macos
          # Pure Go binaries (no CGO needed)
          for cmd in coral launch-coral coral-board coral-hook-agentic-state coral-hook-message-check coral-hook-task-sync; do
            CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o "../dist/macos/${cmd}-arm64" "./cmd/$cmd/"
            CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o "../dist/macos/${cmd}-amd64" "./cmd/$cmd/"
            lipo -create -output "../dist/macos/$cmd" "../dist/macos/${cmd}-arm64" "../dist/macos/${cmd}-amd64"
            rm "../dist/macos/${cmd}-arm64" "../dist/macos/${cmd}-amd64"
          done
          # Tray app + webview app require CGO for native platform APIs
          for cmd in coral-tray coral-app; do
            CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -tags webview -ldflags "-s -w" -o "../dist/macos/${cmd}-arm64" "./cmd/$cmd/"
            CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -tags webview -ldflags "-s -w" -o "../dist/macos/${cmd}-amd64" "./cmd/$cmd/"
            lipo -create -output "../dist/macos/$cmd" "../dist/macos/${cmd}-arm64" "../dist/macos/${cmd}-amd64"
            rm "../dist/macos/${cmd}-arm64" "../dist/macos/${cmd}-amd64"
          done

      - name: Generate .icns icon
        run: |
          ICON_PNG="coral-go/internal/server/frontend/static/coral.png"
          if [ -f "$ICON_PNG" ]; then
            mkdir -p Coral.iconset
            for size in 16 32 64 128 256 512; do
              sips -z $size $size "$ICON_PNG" --out "Coral.iconset/icon_${size}x${size}.png" >/dev/null
            done
            for size in 32 64 128 256 512 1024; do
              half=$((size / 2))
              sips -z $size $size "$ICON_PNG" --out "Coral.iconset/icon_${half}x${half}@2x.png" >/dev/null
            done
            iconutil -c icns Coral.iconset -o Coral.icns
            rm -rf Coral.iconset
          fi

      - name: Create Coral.app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP="dist/Coral.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          for cmd in dist/macos/*; do
            bin=$(basename "$cmd")
            cp "$cmd" "$APP/Contents/MacOS/$bin"
            chmod +x "$APP/Contents/MacOS/$bin"
          done
          sed "s/VERSION_PLACEHOLDER/${VERSION}/g" scripts/Info.plist > "$APP/Contents/Info.plist"
          [ -f Coral.icns ] && cp Coral.icns "$APP/Contents/Resources/AppIcon.icns"

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import certificate.p12 -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$(security default-keychain -d user | tr -d '"' | xargs)"
          rm -f certificate.p12
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign Coral.app
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          APP="dist/Coral.app"
          # Sign the entire .app bundle with --deep (signs all nested binaries)
          echo "Signing Coral.app bundle (deep)..."
          codesign --force --deep --options runtime --sign "$SIGNING_IDENTITY" \
            --entitlements entitlements.plist "$APP"
          echo "Verifying..."
          codesign --verify --deep --verbose=2 "$APP"

      - name: Create DMG
        run: |
          brew install create-dmg
          VOLICON_ARGS=""
          [ -f Coral.icns ] && VOLICON_ARGS="--volicon Coral.icns"
          create-dmg \
            --volname "Coral" \
            ${VOLICON_ARGS} \
            --window-pos 200 120 --window-size 600 400 \
            --icon-size 100 --icon "Coral.app" 175 190 \
            --app-drop-link 425 190 --no-internet-enable \
            "dist/Coral.dmg" "dist/Coral.app"

      - name: Sign DMG
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          codesign --force --sign "$SIGNING_IDENTITY" "dist/Coral.dmg"

      - name: Notarize DMG
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          SUBMIT_OUT=$(xcrun notarytool submit "dist/Coral.dmg" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --output-format json)
          SUBMISSION_ID=$(echo "$SUBMIT_OUT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          xcrun notarytool wait "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --timeout 30m
          xcrun stapler staple "dist/Coral.dmg"

      - name: Cleanup keychain
        if: always() && env.KEYCHAIN_PATH != ''
        run: security delete-keychain "$KEYCHAIN_PATH" || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: coral-macos-dmg
          path: dist/Coral.dmg

  # ── Create GitHub Release with all assets ──────────────────────
  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Create the release if it doesn't exist
          gh release create "$TAG" --title "$TAG" --generate-notes || true
          # Upload all artifacts
          for f in artifacts/**/*; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber
          done
