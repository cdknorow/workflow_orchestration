<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="white">
  <!-- Outer C-shape arc with circuit trace styling -->
  <defs>
    <clipPath id="c-clip">
      <path d="M256 28C130.1 28 28 130.1 28 256s102.1 228 228 228c40.5 0 78.6-10.6 111.5-29.1l-28-48.5C322.8 421.8 290.4 432 256 432c-97.2 0-176-78.8-176-176S158.8 80 256 80c34.4 0 66.8 10.2 93.5 25.6l28-48.5C344.6 38.6 296.5 28 256 28z"/>
    </clipPath>
  </defs>

  <!-- C-shape body -->
  <path d="M256 28C130.1 28 28 130.1 28 256s102.1 228 228 228c40.5 0 78.6-10.6 111.5-29.1l-28-48.5C322.8 421.8 290.4 432 256 432c-97.2 0-176-78.8-176-176S158.8 80 256 80c34.4 0 66.8 10.2 93.5 25.6l28-48.5C344.6 38.6 296.5 28 256 28z" opacity="0.15"/>

  <!-- Outer ring of C -->
  <path d="M256 16C123.5 16 16 123.5 16 256s107.5 240 240 240c43 0 83.4-11.2 118.5-30.9l5.5-3.1-56-32.3-4.2 2.2C296 446.7 276.8 452 256 452c-108.1 0-196-87.9-196-196S147.9 60 256 60c20.8 0 40 5.3 63.8 20.1l4.2 2.2 56-32.3-5.5-3.1C339.4 27.2 299 16 256 16z" fill="none" stroke="white" stroke-width="6"/>

  <!-- Inner ring of C -->
  <path d="M256 72C154.4 72 72 154.4 72 256s82.4 184 184 184c30 0 58.5-7 83.8-19.5l-24-41.5C299.5 390.2 278.4 396 256 396c-77.3 0-140-62.7-140-140s62.7-140 140-140c22.4 0 43.5 5.8 63.8 17l24-41.5C318.5 79 290 72 256 72z" fill="none" stroke="white" stroke-width="4"/>

  <!-- Circuit traces on the C arc -->
  <!-- Top trace -->
  <circle cx="160" cy="90" r="5"/>
  <line x1="160" y1="90" x2="200" y2="70" stroke="white" stroke-width="2.5"/>
  <circle cx="200" cy="70" r="4"/>
  <line x1="200" y1="70" x2="245" y2="58" stroke="white" stroke-width="2.5"/>
  <circle cx="245" cy="58" r="4"/>

  <!-- Left traces -->
  <circle cx="68" cy="195" r="5"/>
  <line x1="68" y1="195" x2="55" y2="230" stroke="white" stroke-width="2.5"/>
  <circle cx="55" cy="230" r="4"/>

  <circle cx="52" cy="270" r="4"/>
  <line x1="52" y1="270" x2="56" y2="310" stroke="white" stroke-width="2.5"/>
  <circle cx="56" cy="310" r="5"/>

  <!-- Bottom trace -->
  <circle cx="90" cy="370" r="5"/>
  <line x1="90" y1="370" x2="130" y2="405" stroke="white" stroke-width="2.5"/>
  <circle cx="130" cy="405" r="4"/>
  <line x1="130" y1="405" x2="180" y2="430" stroke="white" stroke-width="2.5"/>
  <circle cx="180" cy="430" r="4"/>

  <!-- More traces -->
  <circle cx="108" cy="140" r="4"/>
  <line x1="108" y1="140" x2="85" y2="170" stroke="white" stroke-width="2"/>
  <circle cx="85" cy="170" r="3.5"/>

  <circle cx="85" cy="340" r="3.5"/>
  <line x1="85" y1="340" x2="108" y2="370" stroke="white" stroke-width="2"/>

  <!-- Center hexagonal node network -->
  <g transform="translate(256, 256)">
    <!-- Center hexagon -->
    <polygon points="0,-32 27.7,-16 27.7,16 0,32 -27.7,16 -27.7,-16" fill="white" opacity="0.9"/>

    <!-- Top hexagon -->
    <polygon points="0,-100 22,-88 22,-68 0,-56 -22,-68 -22,-88" fill="white" opacity="0.75"/>
    <!-- Connection line -->
    <line x1="0" y1="-56" x2="0" y2="-32" stroke="white" stroke-width="3" opacity="0.6"/>

    <!-- Top-right hexagon -->
    <polygon points="68,-50 90,-38 90,-18 68,-6 46,-18 46,-38" fill="white" opacity="0.75"/>
    <line x1="27.7" y1="-16" x2="46" y2="-28" stroke="white" stroke-width="3" opacity="0.6"/>

    <!-- Bottom-right hexagon -->
    <polygon points="68,6 90,18 90,38 68,50 46,38 46,18" fill="white" opacity="0.75"/>
    <line x1="27.7" y1="16" x2="46" y2="28" stroke="white" stroke-width="3" opacity="0.6"/>

    <!-- Bottom hexagon -->
    <polygon points="0,56 22,68 22,88 0,100 -22,88 -22,68" fill="white" opacity="0.75"/>
    <line x1="0" y1="32" x2="0" y2="56" stroke="white" stroke-width="3" opacity="0.6"/>

    <!-- Bottom-left hexagon -->
    <polygon points="-68,6 -46,18 -46,38 -68,50 -90,38 -90,18" fill="white" opacity="0.75"/>
    <line x1="-27.7" y1="16" x2="-46" y2="28" stroke="white" stroke-width="3" opacity="0.6"/>

    <!-- Top-left hexagon -->
    <polygon points="-68,-50 -46,-38 -46,-18 -68,-6 -90,-18 -90,-38" fill="white" opacity="0.75"/>
    <line x1="-27.7" y1="-16" x2="-46" y2="-28" stroke="white" stroke-width="3" opacity="0.6"/>

    <!-- Outer ring connections (hex to hex) -->
    <line x1="0" y1="-56" x2="46" y2="-38" stroke="white" stroke-width="2" opacity="0.4"/>
    <line x1="46" y1="-18" x2="46" y2="18" stroke="white" stroke-width="2" opacity="0.4"/>
    <line x1="46" y1="38" x2="0" y2="56" stroke="white" stroke-width="2" opacity="0.4"/>
    <line x1="0" y1="56" x2="-46" y2="38" stroke="white" stroke-width="2" opacity="0.4"/>
    <line x1="-46" y1="18" x2="-46" y2="-18" stroke="white" stroke-width="2" opacity="0.4"/>
    <line x1="-46" y1="-38" x2="0" y2="-56" stroke="white" stroke-width="2" opacity="0.4"/>

    <!-- Diagonal cross connections -->
    <line x1="-46" y1="-28" x2="46" y2="28" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <line x1="46" y1="-28" x2="-46" y2="28" stroke="white" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- C-shape opening - top arm end -->
  <ellipse cx="355" cy="62" rx="16" ry="10" transform="rotate(-30 355 62)" opacity="0.8"/>
  <!-- C-shape opening - bottom arm end -->
  <ellipse cx="355" cy="450" rx="16" ry="10" transform="rotate(30 355 450)" opacity="0.8"/>
</svg>
