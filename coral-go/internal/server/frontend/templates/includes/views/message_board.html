{{ define "includes/views/message_board.html" }}
<!-- Message Board View -->
<div id="messageboard-view" class="session-view" style="display:none">
    <div class="session-header mb-view-header">
        <div class="mb-view-header-left">
            <h2 id="messageboard-title">Message Board</h2>
            <span class="badge" id="messageboard-project-badge" style="display:none"></span>
        </div>
        <div class="mb-header-actions" style="margin-left:auto">
            <button class="mb-action-btn" id="mb-export-btn" style="display:none" onclick="showExportBoardModal()">Export</button>
            <button class="mb-action-btn" id="mb-pause-btn" style="display:none" onclick="toggleBoardPause()">Pause Reads</button>
            <button class="mb-action-btn mb-action-danger" id="mb-delete-btn" style="display:none" onclick="confirmDeleteBoard()">Delete</button>
        </div>
    </div>

    <div class="view-body mb-view-body">
        <!-- Project list (shown when no project selected) -->
        <div id="mb-project-list" class="mb-project-list">
            <div class="empty-state" id="mb-projects-empty">No projects yet</div>
            <ul class="session-list" id="mb-projects-ul"></ul>
        </div>

        <!-- Board view (shown when project selected) -->
        <div id="mb-board" class="mb-board" style="display:none">
            <!-- Messages -->
            <div id="mb-messages" class="mb-messages-scroll">
                <div id="mb-sleep-banner" class="mb-sleep-banner" style="display:none">
                    <span>🌙 This team is sleeping. Messages are paused.</span>
                </div>
                <div class="empty-state" id="mb-messages-empty">No messages yet</div>
            </div>

            <!-- Post form -->
            <div class="mb-post-form">
                <textarea id="mb-post-input" class="mb-post-input" placeholder="Post a message as Developer..." aria-label="Post message to board"
                       rows="2"
                       onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();postBoardMessage()}"></textarea>
                <button class="btn btn-primary mb-post-send-btn" onclick="postBoardMessage()">Send</button>
            </div>
        </div>

        <!-- Subscribers panel (shown alongside board) -->
        <div id="mb-subscribers-panel" class="mb-subscribers-panel" style="display:none">
            <h3 class="mb-subscribers-title">Subscribers</h3>
            <ul id="mb-subscribers-list" class="mb-subscribers-list"></ul>
        </div>
    </div>
</div>

{{ end }}
